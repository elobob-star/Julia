# CI for the Julia orchestrator (see vision.md §17: built to at least the
# standard it enforces on managed code — lint, types, and tests).
stages:
  - test

default:
  image: python:3.12-slim
  cache:
    key:
      files:
        - pyproject.toml
    paths:
      - .cache/pip
  before_script:
    - python -m pip install --upgrade pip
    - pip install -e ".[dev]"

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

lint:
  stage: test
  script:
    - ruff check src tests

typecheck:
  stage: test
  script:
    - mypy src

test:
  stage: test
  script:
    - pytest -q --timeout=30 --timeout-method=thread
